<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – Admin Panel</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#1a1a1e;--surface:#22222a;--surface2:#2a2a35;--border:#35354a;
            --accent:#4a90e2;--accent-h:#357abd;--accent2:#f5c518;
            --text:#e8e8f0;--muted:#8888a8;--danger:#e05252;--success:#52c78a;--radius:8px;
        }
        body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            background-image:radial-gradient(ellipse at 70% 30%,rgba(74,144,226,.07) 0%,transparent 55%);}
        .wrap{width:100%;max-width:400px;padding:1rem;}
        .logo{text-align:center;margin-bottom:2rem;}
        .logo-mark{font-size:2.4rem;margin-bottom:.5rem;}
        .logo h1{font-size:1.3rem;font-weight:800;letter-spacing:-.02em;}
        .logo h1 span{color:var(--accent2);}
        .logo p{color:var(--muted);font-size:.82rem;margin-top:.3rem;}
        .restricted{display:inline-block;background:rgba(74,144,226,.12);border:1px solid rgba(74,144,226,.3);
            color:var(--accent);font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
            padding:.22rem .7rem;border-radius:20px;margin-bottom:1.2rem;}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;}
        .form-group{margin-bottom:1rem;}
        .form-group label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);
            text-transform:uppercase;letter-spacing:.07em;margin-bottom:.35rem;}
        .form-group input{width:100%;padding:.62rem .9rem;background:var(--surface2);border:1px solid var(--border);
            border-radius:var(--radius);color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s;}
        .form-group input:focus{border-color:var(--accent);}
        .btn-submit{width:100%;padding:.72rem;background:var(--accent);color:#fff;border:none;
            border-radius:var(--radius);font-size:.9rem;font-weight:700;cursor:pointer;transition:background .2s;margin-top:.4rem;}
        .btn-submit:hover{background:var(--accent-h);}
        .alert{padding:.65rem .9rem;border-radius:var(--radius);margin-bottom:1.1rem;font-size:.82rem;}
        .alert-error{background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.35);color:#f09090;}
        .alert-success{background:rgba(82,199,138,.1);border:1px solid rgba(82,199,138,.35);color:#80dca8;}
    </style>
</head>
<body>
<div class="wrap">
    <div class="logo">
        <div class="logo-mark">⚙️</div>
        <h1>Admin <span>Panel</span></h1>
        <p>VBForge E-Commerce Management</p>
    </div>
    <div class="card">
        <div style="text-align:center;margin-bottom:1.4rem;">
            <span class="restricted">Restricted Access</span>
        </div>
        <div th:if="${param.error}" class="alert alert-error">Invalid credentials. Please try again.</div>
        <div th:if="${param.logout}" class="alert alert-success">You have been signed out.</div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Admin username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-submit">Sign In</button>
        </form>
    </div>
</div>
</body>
</html>
