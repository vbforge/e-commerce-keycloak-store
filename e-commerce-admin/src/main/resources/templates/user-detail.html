<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${user.username}+' – Admin'">User – Admin</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#1a1a1e;--surface:#22222a;--surface2:#2a2a35;--border:#35354a;
            --accent:#4a90e2;--accent-h:#357abd;--accent2:#f5c518;
            --text:#e8e8f0;--muted:#8888a8;--danger:#e05252;--success:#52c78a;--radius:8px;}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}
        .sidebar{width:230px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;}
        .sb-brand{padding:1.4rem 1.25rem 1rem;border-bottom:1px solid var(--border);}
        .sb-brand .mark{font-size:1.5rem;}.sb-brand h2{font-size:.95rem;font-weight:800;margin-top:.3rem;}
        .sb-brand h2 span{color:var(--accent2);}.sb-brand p{font-size:.72rem;color:var(--muted);margin-top:.15rem;}
        .sb-nav{flex:1;padding:.8rem 0;}
        .sb-section{padding:.4rem 1.25rem .2rem;font-size:.63rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:.6rem;}
        .sb-link{display:flex;align-items:center;gap:.65rem;padding:.55rem 1.25rem;color:var(--muted);text-decoration:none;font-size:.875rem;transition:all .15s;border-right:2px solid transparent;}
        .sb-link:hover{color:var(--text);background:var(--surface2);}
        .sb-link.active{color:var(--accent2);background:rgba(245,197,24,.07);border-right-color:var(--accent2);}
        .sb-link .ic{width:16px;text-align:center;}
        .sb-footer{padding:1rem 1.25rem;border-top:1px solid var(--border);}
        .sb-user{font-size:.75rem;color:var(--muted);margin-bottom:.6rem;}
        .sb-user strong{display:block;color:var(--text);font-size:.82rem;}
        .btn-signout{width:100%;padding:.45rem;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--muted);font-size:.78rem;cursor:pointer;transition:all .2s;}
        .btn-signout:hover{background:var(--surface2);color:var(--text);}
        .main{flex:1;display:flex;flex-direction:column;min-width:0;}
        .topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;position:sticky;top:0;z-index:50;}
        .topbar-title{font-size:1rem;font-weight:700;}
        .content{padding:2rem;flex:1;max-width:760px;}
        .back{display:inline-flex;align-items:center;gap:.4rem;color:var(--muted);text-decoration:none;font-size:.82rem;margin-bottom:1.4rem;transition:color .2s;}
        .back:hover{color:var(--accent);}
        .page-title{font-size:1.4rem;font-weight:800;margin-bottom:1.5rem;}
        .page-title span{color:var(--accent2);}
        .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
        @media(max-width:600px){.meta-grid{grid-template-columns:1fr;}}
        .meta-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.2rem;}
        .meta-label{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin-bottom:.35rem;}
        .meta-value{font-size:.9rem;font-weight:600;}
        .role-tag{display:inline-block;padding:.15rem .45rem;border-radius:4px;font-size:.68rem;font-weight:700;margin-right:.25rem;text-transform:uppercase;}
        .role-admin{background:rgba(74,144,226,.15);color:var(--accent);}
        .role-user{background:rgba(245,197,24,.12);color:var(--accent2);}
        .status-on{color:var(--success);font-weight:700;}
        .status-off{color:var(--danger);font-weight:700;}
        .actions{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1.5rem;}
        .btn{display:inline-block;padding:.45rem 1rem;border-radius:var(--radius);border:none;cursor:pointer;font-size:.82rem;font-weight:600;text-decoration:none;transition:all .2s;}
        .btn-toggle{background:rgba(245,197,24,.12);color:var(--accent2);border:1px solid rgba(245,197,24,.25);}
        .btn-toggle:hover{background:rgba(245,197,24,.22);}
        .btn-del{background:rgba(224,82,82,.12);color:var(--danger);border:1px solid rgba(224,82,82,.25);}
        .btn-del:hover{background:rgba(224,82,82,.22);}
        .stat-row{display:flex;gap:1rem;margin-bottom:1.5rem;}
        .stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
            padding:.7rem 1.2rem;text-align:center;min-width:110px;}
        .stat-chip .val{font-size:1.6rem;font-weight:800;color:var(--accent);}
        .stat-chip .lbl{font-size:.7rem;color:var(--muted);margin-top:.15rem;}
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sb-brand"><div class="mark">⚙️</div><h2>Admin <span>Panel</span></h2><p>VBForge Store</p></div>
    <nav class="sb-nav">
        <div class="sb-section">Overview</div>
        <a href="/"         class="sb-link"><span class="ic">📊</span> Dashboard</a>
        <div class="sb-section">Catalogue</div>
        <a href="/products" class="sb-link"><span class="ic">📦</span> Products</a>
        <div class="sb-section">Operations</div>
        <a href="/orders"   class="sb-link"><span class="ic">🛒</span> Orders</a>
        <a href="/users"    class="sb-link active"><span class="ic">👥</span> Users</a>
    </nav>
    <div class="sb-footer">
        <div class="sb-user">Signed in as<br><strong th:text="${#authentication.name}">admin</strong></div>
        <form th:action="@{/logout}" method="post"><button type="submit" class="btn-signout">Sign Out</button></form>
    </div>
</aside>

<div class="main">
    <header class="topbar"><span class="topbar-title">User Detail</span></header>
    <div class="content">
        <a href="/users" class="back">← Back to users</a>
        <div class="page-title" th:text="${user.username}">Username</div>

        <div class="stat-row">
            <div class="stat-chip">
                <div class="val" th:text="${user.orderCount}">0</div>
                <div class="lbl">Orders</div>
            </div>
        </div>

        <div class="meta-grid">
            <div class="meta-card">
                <div class="meta-label">Email</div>
                <div class="meta-value" th:text="${user.email}">—</div>
            </div>
            <div class="meta-card">
                <div class="meta-label">Status</div>
                <span th:if="${user.enabled}" class="status-on">● Active</span>
                <span th:unless="${user.enabled}" class="status-off">● Disabled</span>
            </div>
            <div class="meta-card">
                <div class="meta-label">Roles</div>
                <div>
          <span th:each="role : ${user.roles}"
                th:classappend="${role == 'ADMIN'} ? ' role-admin' : ' role-user'"
                class="role-tag" th:text="${role}">ROLE</span>
                </div>
            </div>
            <div class="meta-card">
                <div class="meta-label">Member since</div>
                <div class="meta-value"
                     th:text="${user.createdAt != null} ? ${#temporals.format(user.createdAt,'dd MMM yyyy')} : '—'">—</div>
            </div>
        </div>

        <div class="actions">
            <form th:action="@{/users/{id}/toggle(id=${user.id})}" method="post" style="display:inline">
                <button type="submit" class="btn btn-toggle"
                        th:text="${user.enabled} ? 'Disable Account' : 'Enable Account'">Toggle</button>
            </form>
            <form th:action="@{/users/{id}/delete(id=${user.id})}" method="post" style="display:inline"
                  onsubmit="return confirm('Permanently delete this user?')">
                <button type="submit" class="btn btn-del">Delete User</button>
            </form>
        </div>

    </div>
</div>
</body>
</html>
