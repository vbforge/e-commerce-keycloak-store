<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users – Admin Panel</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#1a1a1e;--surface:#22222a;--surface2:#2a2a35;--border:#35354a;
            --accent:#4a90e2;--accent-h:#357abd;--accent2:#f5c518;
            --text:#e8e8f0;--muted:#8888a8;--danger:#e05252;--success:#52c78a;--radius:8px;}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}
        .sidebar{width:230px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;}
        .sb-brand{padding:1.4rem 1.25rem 1rem;border-bottom:1px solid var(--border);}
        .sb-brand .mark{font-size:1.5rem;}.sb-brand h2{font-size:.95rem;font-weight:800;margin-top:.3rem;}
        .sb-brand h2 span{color:var(--accent2);}.sb-brand p{font-size:.72rem;color:var(--muted);margin-top:.15rem;}
        .sb-nav{flex:1;padding:.8rem 0;}
        .sb-section{padding:.4rem 1.25rem .2rem;font-size:.63rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:.6rem;}
        .sb-link{display:flex;align-items:center;gap:.65rem;padding:.55rem 1.25rem;color:var(--muted);text-decoration:none;font-size:.875rem;transition:all .15s;border-right:2px solid transparent;}
        .sb-link:hover{color:var(--text);background:var(--surface2);}
        .sb-link.active{color:var(--accent2);background:rgba(245,197,24,.07);border-right-color:var(--accent2);}
        .sb-link .ic{width:16px;text-align:center;}
        .sb-footer{padding:1rem 1.25rem;border-top:1px solid var(--border);}
        .sb-user{font-size:.75rem;color:var(--muted);margin-bottom:.6rem;}
        .sb-user strong{display:block;color:var(--text);font-size:.82rem;}
        .btn-signout{width:100%;padding:.45rem;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--muted);font-size:.78rem;cursor:pointer;transition:all .2s;}
        .btn-signout:hover{background:var(--surface2);color:var(--text);}
        .main{flex:1;display:flex;flex-direction:column;min-width:0;}
        .topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;position:sticky;top:0;z-index:50;}
        .topbar-title{font-size:1rem;font-weight:700;}
        .content{padding:2rem;flex:1;}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
        table{width:100%;border-collapse:collapse;font-size:.85rem;}
        thead th{background:var(--surface2);padding:.55rem 1rem;text-align:left;color:var(--muted);font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.07em;}
        tbody tr{border-bottom:1px solid var(--border);}
        tbody tr:last-child{border-bottom:none;}
        tbody tr:hover{background:var(--surface2);}
        tbody td{padding:.65rem 1rem;vertical-align:middle;}
        .role-tag{display:inline-block;padding:.15rem .45rem;border-radius:4px;font-size:.68rem;font-weight:700;margin-right:.25rem;text-transform:uppercase;}
        .role-admin{background:rgba(74,144,226,.15);color:var(--accent);}
        .role-user{background:rgba(245,197,24,.12);color:var(--accent2);}
        .status-on{color:var(--success);font-weight:600;font-size:.78rem;}
        .status-off{color:var(--danger);font-weight:600;font-size:.78rem;}
        .btn{display:inline-block;padding:.27rem .65rem;border-radius:var(--radius);border:none;cursor:pointer;font-size:.75rem;font-weight:600;text-decoration:none;transition:all .2s;}
        .btn-view{background:rgba(74,144,226,.12);color:var(--accent);}
        .btn-view:hover{background:rgba(74,144,226,.25);}
        .btn-toggle{background:rgba(245,197,24,.12);color:var(--accent2);}
        .btn-toggle:hover{background:rgba(245,197,24,.25);}
        .btn-del{background:rgba(224,82,82,.12);color:var(--danger);}
        .btn-del:hover{background:rgba(224,82,82,.25);}
        .alert{padding:.65rem 1rem;border-radius:var(--radius);margin-bottom:1.2rem;font-size:.82rem;}
        .alert-success{background:rgba(82,199,138,.1);border:1px solid rgba(82,199,138,.35);color:#80dca8;}
        .empty{padding:2rem;text-align:center;color:var(--muted);font-size:.875rem;}
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sb-brand"><div class="mark">⚙️</div><h2>Admin <span>Panel</span></h2><p>VBForge Store</p></div>
    <nav class="sb-nav">
        <div class="sb-section">Overview</div>
        <a href="/"         class="sb-link"><span class="ic">📊</span> Dashboard</a>
        <div class="sb-section">Catalogue</div>
        <a href="/products" class="sb-link"><span class="ic">📦</span> Products</a>
        <div class="sb-section">Operations</div>
        <a href="/orders"   class="sb-link"><span class="ic">🛒</span> Orders</a>
        <a href="/users"    class="sb-link active"><span class="ic">👥</span> Users</a>
    </nav>
    <div class="sb-footer">
        <div class="sb-user">Signed in as<br><strong th:text="${#authentication.name}">admin</strong></div>
        <form th:action="@{/logout}" method="post"><button type="submit" class="btn-signout">Sign Out</button></form>
    </div>
</aside>

<div class="main">
    <header class="topbar"><span class="topbar-title">Users</span></header>
    <div class="content">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div class="card">
            <div th:if="${#lists.isEmpty(users)}" class="empty">No users found.</div>
            <table th:unless="${#lists.isEmpty(users)}">
                <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Roles</th><th>Orders</th><th>Status</th><th>Joined</th><th></th></tr></thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td style="color:var(--muted)" th:text="${u.id}">1</td>
                    <td style="font-weight:600" th:text="${u.username}">user</td>
                    <td style="color:var(--muted);font-size:.8rem" th:text="${u.email}">email</td>
                    <td>
              <span th:each="role : ${u.roles}"
                    th:classappend="${role == 'ADMIN'} ? ' role-admin' : ' role-user'"
                    class="role-tag" th:text="${role}">ROLE</span>
                    </td>
                    <td th:text="${u.orderCount}" style="color:var(--muted)">0</td>
                    <td>
                        <span th:if="${u.enabled}" class="status-on">● Active</span>
                        <span th:unless="${u.enabled}" class="status-off">● Disabled</span>
                    </td>
                    <td style="color:var(--muted);font-size:.78rem"
                        th:text="${u.createdAt != null} ? ${#temporals.format(u.createdAt,'dd MMM yyyy')} : '—'">—</td>
                    <td>
                        <a th:href="@{/users/{id}(id=${u.id})}" class="btn btn-view">View</a>
                        <form th:action="@{/users/{id}/toggle(id=${u.id})}" method="post" style="display:inline">
                            <button type="submit" class="btn btn-toggle"
                                    th:text="${u.enabled} ? 'Disable' : 'Enable'">Toggle</button>
                        </form>
                        <form th:action="@{/users/{id}/delete(id=${u.id})}" method="post" style="display:inline"
                              onsubmit="return confirm('Delete user ' + /*[[${u.username}]]*/ '' + '?')">
                            <button type="submit" class="btn btn-del">✕</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
