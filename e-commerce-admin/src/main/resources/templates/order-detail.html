<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Order #'+${order.id}+' – Admin'">Order – Admin</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#1a1a1e;--surface:#22222a;--surface2:#2a2a35;--border:#35354a;
            --accent:#4a90e2;--accent-h:#357abd;--accent2:#f5c518;
            --text:#e8e8f0;--muted:#8888a8;--danger:#e05252;--success:#52c78a;--info:#52b8e0;--warning:#f5c518;--radius:8px;}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}
        .sidebar{width:230px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;}
        .sb-brand{padding:1.4rem 1.25rem 1rem;border-bottom:1px solid var(--border);}
        .sb-brand .mark{font-size:1.5rem;}.sb-brand h2{font-size:.95rem;font-weight:800;margin-top:.3rem;}
        .sb-brand h2 span{color:var(--accent2);}.sb-brand p{font-size:.72rem;color:var(--muted);margin-top:.15rem;}
        .sb-nav{flex:1;padding:.8rem 0;}
        .sb-section{padding:.4rem 1.25rem .2rem;font-size:.63rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:.6rem;}
        .sb-link{display:flex;align-items:center;gap:.65rem;padding:.55rem 1.25rem;color:var(--muted);text-decoration:none;font-size:.875rem;transition:all .15s;border-right:2px solid transparent;}
        .sb-link:hover{color:var(--text);background:var(--surface2);}
        .sb-link.active{color:var(--accent2);background:rgba(245,197,24,.07);border-right-color:var(--accent2);}
        .sb-link .ic{width:16px;text-align:center;}
        .sb-footer{padding:1rem 1.25rem;border-top:1px solid var(--border);}
        .sb-user{font-size:.75rem;color:var(--muted);margin-bottom:.6rem;}
        .sb-user strong{display:block;color:var(--text);font-size:.82rem;}
        .btn-signout{width:100%;padding:.45rem;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--muted);font-size:.78rem;cursor:pointer;transition:all .2s;}
        .btn-signout:hover{background:var(--surface2);color:var(--text);}
        .main{flex:1;display:flex;flex-direction:column;min-width:0;}
        .topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;position:sticky;top:0;z-index:50;}
        .topbar-title{font-size:1rem;font-weight:700;}
        .content{padding:2rem;flex:1;max-width:860px;}
        .back{display:inline-flex;align-items:center;gap:.4rem;color:var(--muted);text-decoration:none;font-size:.82rem;margin-bottom:1.4rem;transition:color .2s;}
        .back:hover{color:var(--accent);}
        .page-title{font-size:1.4rem;font-weight:800;margin-bottom:1.5rem;}
        .page-title span{color:var(--accent2);}
        .meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;}
        @media(max-width:700px){.meta-grid{grid-template-columns:1fr 1fr;}}
        .meta-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.2rem;}
        .meta-label{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin-bottom:.35rem;}
        .meta-value{font-size:.9rem;font-weight:600;}
        .badge{display:inline-block;padding:.2rem .6rem;border-radius:4px;font-size:.72rem;font-weight:700;text-transform:uppercase;}
        .b-pending  {background:rgba(245,197,24,.15);color:var(--warning);}
        .b-confirmed{background:rgba(74,144,226,.15);color:var(--accent);}
        .b-shipped  {background:rgba(82,184,224,.15);color:var(--info);}
        .b-delivered{background:rgba(82,199,138,.15);color:var(--success);}
        .b-cancelled{background:rgba(224,82,82,.12);color:var(--danger);}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.2rem;}
        .card-head{padding:.85rem 1.25rem;border-bottom:1px solid var(--border);font-size:.85rem;font-weight:700;}
        table{width:100%;border-collapse:collapse;font-size:.85rem;}
        thead th{background:var(--surface2);padding:.55rem 1rem;text-align:left;color:var(--muted);font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.07em;}
        tbody tr{border-bottom:1px solid var(--border);}
        tbody tr:last-child{border-bottom:none;}
        tbody td{padding:.7rem 1rem;}
        .total-row{display:flex;justify-content:space-between;padding:1rem 1.25rem;background:var(--surface2);border-top:1px solid var(--border);font-size:1rem;font-weight:800;}
        .total-row .amount{color:var(--accent);}
        /* Status update form */
        .status-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
        .status-form label{font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
        .status-select{padding:.5rem .8rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.875rem;outline:none;}
        .status-select:focus{border-color:var(--accent);}
        .status-select option{background:var(--surface2);}
        .btn-update{padding:.5rem 1.1rem;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:.85rem;font-weight:700;cursor:pointer;transition:background .2s;}
        .btn-update:hover{background:var(--accent-h);}
        .alert{padding:.65rem 1rem;border-radius:var(--radius);margin-bottom:1.2rem;font-size:.82rem;}
        .alert-success{background:rgba(82,199,138,.1);border:1px solid rgba(82,199,138,.35);color:#80dca8;}
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sb-brand"><div class="mark">⚙️</div><h2>Admin <span>Panel</span></h2><p>VBForge Store</p></div>
    <nav class="sb-nav">
        <div class="sb-section">Overview</div>
        <a href="/"         class="sb-link"><span class="ic">📊</span> Dashboard</a>
        <div class="sb-section">Catalogue</div>
        <a href="/products" class="sb-link"><span class="ic">📦</span> Products</a>
        <div class="sb-section">Operations</div>
        <a href="/orders"   class="sb-link active"><span class="ic">🛒</span> Orders</a>
        <a href="/users"    class="sb-link"><span class="ic">👥</span> Users</a>
    </nav>
    <div class="sb-footer">
        <div class="sb-user">Signed in as<br><strong th:text="${#authentication.name}">admin</strong></div>
        <form th:action="@{/logout}" method="post"><button type="submit" class="btn-signout">Sign Out</button></form>
    </div>
</aside>

<div class="main">
    <header class="topbar"><span class="topbar-title">Order Detail</span></header>
    <div class="content">
        <a href="/orders" class="back">← Back to orders</a>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div class="page-title">Order <span th:text="'#'+${order.id}">—</span></div>

        <div class="meta-grid">
            <div class="meta-card">
                <div class="meta-label">Customer</div>
                <div class="meta-value" th:text="${order.customerUsername}">—</div>
                <div style="color:var(--muted);font-size:.78rem;margin-top:.2rem" th:text="${order.customerEmail}">—</div>
            </div>
            <div class="meta-card">
                <div class="meta-label">Status</div>
                <span th:classappend="'b-'+${order.status.name().toLowerCase()}"
                      class="badge" th:text="${order.status}">—</span>
            </div>
            <div class="meta-card">
                <div class="meta-label">Placed on</div>
                <div class="meta-value" th:text="${#temporals.format(order.createdAt,'dd MMM yyyy · HH:mm')}">—</div>
            </div>
            <div class="meta-card" style="grid-column:1/-1">
                <div class="meta-label">Shipping address</div>
                <div class="meta-value" th:text="${order.shippingAddress ?: '—'}">—</div>
            </div>
        </div>

        <!-- Status update -->
        <form th:action="@{/orders/{id}/status(id=${order.id})}" method="post" class="status-form">
            <label>Update Status</label>
            <select name="status" class="status-select">
                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                        th:selected="${s == order.status}">STATUS</option>
            </select>
            <button type="submit" class="btn-update">Apply</button>
        </form>

        <!-- Items -->
        <div class="card">
            <div class="card-head">Items</div>
            <table>
                <thead><tr><th>Product</th><th>Unit Price</th><th>Qty</th><th>Subtotal</th></tr></thead>
                <tbody>
                <tr th:each="item : ${order.items}">
                    <td style="font-weight:500" th:text="${item.productName}">Product</td>
                    <td th:text="'$'+${#numbers.formatDecimal(item.unitPrice,1,2)}">$0</td>
                    <td th:text="${item.quantity}">1</td>
                    <td style="font-weight:700;color:var(--accent)"
                        th:text="'$'+${#numbers.formatDecimal(item.subtotal,1,2)}">$0</td>
                </tr>
                </tbody>
            </table>
            <div class="total-row">
                <span>Order Total</span>
                <span class="amount" th:text="'$'+${#numbers.formatDecimal(order.totalPrice,1,2)}">$0</span>
            </div>
        </div>

    </div>
</div>
</body>
</html>
