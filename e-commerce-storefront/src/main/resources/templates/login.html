<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – VBForge Store</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#1a1a1e;--surface:#22222a;--surface2:#2a2a35;--border:#35354a;
            --accent:#4a90e2;--accent-h:#357abd;--accent2:#f5c518;
            --text:#e8e8f0;--muted:#8888a8;--danger:#e05252;--success:#52c78a;
            --radius:8px;
        }
        body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            background-image:radial-gradient(ellipse at 30% 60%,rgba(74,144,226,.07) 0%,transparent 55%);}
        .wrap{width:100%;max-width:400px;padding:1rem;}
        .logo{text-align:center;margin-bottom:2rem;}
        .logo-mark{font-size:2.2rem;margin-bottom:.4rem;}
        .logo h1{font-size:1.4rem;font-weight:800;letter-spacing:-.02em;}
        .logo h1 span{color:var(--accent2);}
        .logo p{color:var(--muted);font-size:.82rem;margin-top:.3rem;}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;}
        .card-title{font-size:1rem;font-weight:700;margin-bottom:1.5rem;color:var(--text);}
        .form-group{margin-bottom:1rem;}
        .form-group label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);
            text-transform:uppercase;letter-spacing:.07em;margin-bottom:.35rem;}
        .form-group input{width:100%;padding:.6rem .9rem;background:var(--surface2);border:1px solid var(--border);
            border-radius:var(--radius);color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s;}
        .form-group input:focus{border-color:var(--accent);}
        .btn-submit{width:100%;padding:.72rem;background:var(--accent);color:#fff;border:none;
            border-radius:var(--radius);font-size:.9rem;font-weight:700;cursor:pointer;
            transition:background .2s;margin-top:.5rem;letter-spacing:.02em;}
        .btn-submit:hover{background:var(--accent-h);}
        .alert{padding:.65rem .9rem;border-radius:var(--radius);margin-bottom:1.2rem;font-size:.82rem;}
        .alert-error{background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.35);color:#f09090;}
        .alert-success{background:rgba(82,199,138,.1);border:1px solid rgba(82,199,138,.35);color:#80dca8;}
        .divider{text-align:center;margin:1.2rem 0;color:var(--muted);font-size:.78rem;position:relative;}
        .divider::before,.divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:var(--border);}
        .divider::before{left:0;}.divider::after{right:0;}
        .footer-link{text-align:center;margin-top:1.2rem;font-size:.82rem;color:var(--muted);}
        .footer-link a{color:var(--accent);text-decoration:none;font-weight:600;}
        .footer-link a:hover{text-decoration:underline;}
    </style>
</head>
<body>
<div class="wrap">
    <div class="logo">
        <div class="logo-mark">🛒</div>
        <h1>VBForge <span>Store</span></h1>
        <p>Sign in to your account</p>
    </div>
    <div class="card">
        <div class="card-title">Welcome back</div>
        <div th:if="${param.error}" class="alert alert-error">Invalid username or password.</div>
        <div th:if="${param.logout}" class="alert alert-success">You have been signed out.</div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-submit">Sign In</button>
        </form>
        <div class="divider">or</div>
        <div class="footer-link">No account? <a href="/register">Create one free</a></div>
    </div>
</div>
</body>
</html>
