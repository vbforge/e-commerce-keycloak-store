<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products – VBForge Store</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#1a1a1e;--surface:#22222a;--surface2:#2a2a35;--border:#35354a;
            --accent:#4a90e2;--accent-h:#357abd;--accent2:#f5c518;
            --text:#e8e8f0;--muted:#8888a8;--danger:#e05252;--success:#52c78a;--radius:8px;
        }
        body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
        nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;
            height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
        .nav-brand{font-size:1.15rem;font-weight:800;text-decoration:none;color:var(--text);}
        .nav-brand span{color:var(--accent2);}
        .nav-links{display:flex;align-items:center;gap:1.4rem;}
        .nav-links a{color:var(--muted);text-decoration:none;font-size:.875rem;transition:color .2s;}
        .nav-links a:hover,.nav-links a.active{color:var(--text);}
        .btn{display:inline-block;padding:.38rem .9rem;border-radius:var(--radius);border:none;
            cursor:pointer;font-size:.82rem;font-weight:600;text-decoration:none;transition:all .2s;}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
        .btn-outline:hover{background:var(--surface2);}
        .btn-yellow{background:var(--accent2);color:#111;font-weight:700;}
        .btn-yellow:hover{background:#e0b010;}
        /* PAGE LAYOUT */
        main{flex:1;padding:2rem;max-width:1280px;width:100%;margin:0 auto;}
        .page-header{margin-bottom:1.8rem;}
        .page-header h1{font-size:1.5rem;font-weight:800;margin-bottom:.3rem;}
        .page-header p{color:var(--muted);font-size:.875rem;}
        /* FILTER BAR */
        .filter-bar{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.8rem;}
        .filter-btn{padding:.38rem .9rem;border-radius:20px;border:1px solid var(--border);
            background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;
            text-decoration:none;transition:all .2s;}
        .filter-btn:hover{border-color:var(--accent);color:var(--accent);}
        .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
        /* GRID */
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:1rem;}
        .product-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
            padding:1.25rem;display:flex;flex-direction:column;transition:border-color .2s,transform .2s;}
        .product-card:hover{border-color:var(--accent);transform:translateY(-2px);}
        .product-cat{font-size:.68rem;font-weight:700;color:var(--accent2);text-transform:uppercase;
            letter-spacing:.08em;margin-bottom:.5rem;}
        .product-name{font-weight:600;font-size:.95rem;margin-bottom:.35rem;}
        .product-desc{color:var(--muted);font-size:.78rem;line-height:1.5;margin-bottom:.9rem;flex:1;
            display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
        .product-footer{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;}
        .product-price{font-size:1.05rem;font-weight:800;color:var(--accent);}
        .stock-badge{font-size:.68rem;font-weight:600;padding:.15rem .45rem;border-radius:4px;}
        .in-stock{background:rgba(82,199,138,.15);color:var(--success);}
        .low-stock{background:rgba(245,197,24,.15);color:var(--accent2);}
        .out-stock{background:rgba(224,82,82,.1);color:var(--danger);}
        .view-btn{display:block;text-align:center;padding:.45rem;background:var(--surface2);
            border:1px solid var(--border);border-radius:var(--radius);font-size:.82rem;
            color:var(--text);text-decoration:none;transition:border-color .2s;}
        .view-btn:hover{border-color:var(--accent);color:var(--accent);}
        .empty{text-align:center;padding:4rem 1rem;color:var(--muted);}
        footer{background:var(--surface);border-top:1px solid var(--border);
            padding:1.2rem 2rem;text-align:center;font-size:.78rem;color:var(--muted);}
    </style>
</head>
<body>

<nav>
    <a class="nav-brand" href="/">VBForge <span>Store</span></a>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/products" class="active">Products</a>
        <span sec:authorize="isAuthenticated()">
      <a href="/cart">Cart</a>
      <a href="/orders">Orders</a>
    </span>
        <span sec:authorize="isAuthenticated()">
      <form th:action="@{/logout}" method="post" style="display:inline">
        <button type="submit" class="btn btn-outline">Sign out</button>
      </form>
    </span>
        <span sec:authorize="isAnonymous()">
      <a href="/login" class="btn btn-outline">Sign in</a>
      <a href="/register" class="btn btn-yellow">Register</a>
    </span>
    </div>
</nav>

<main>
    <div class="page-header">
        <h1>All Products</h1>
        <p>Browse our full catalogue</p>
    </div>

    <!-- Category filter -->
    <div class="filter-bar">
        <a href="/products" th:classappend="${selectedCategory == null} ? ' active' : ''" class="filter-btn">All</a>
        <a th:each="cat : ${categories}"
           th:href="@{/products(category=${cat})}"
           th:text="${cat}"
           th:classappend="${selectedCategory == cat} ? ' active' : ''"
           class="filter-btn">CAT</a>
    </div>

    <div th:if="${#lists.isEmpty(products)}" class="empty">
        <p>No products found in this category.</p>
    </div>

    <div class="grid" th:unless="${#lists.isEmpty(products)}">
        <div class="product-card" th:each="p : ${products}">
            <div class="product-cat" th:text="${p.category}">CATEGORY</div>
            <div class="product-name" th:text="${p.name}">Name</div>
            <div class="product-desc" th:text="${p.description ?: ''}"></div>
            <div class="product-footer">
                <span class="product-price" th:text="'$' + ${#numbers.formatDecimal(p.price,1,2)}">$0.00</span>
                <span th:if="${p.stock > 5}" class="stock-badge in-stock">In stock</span>
                <span th:if="${p.stock > 0 and p.stock <= 5}" class="stock-badge low-stock"
                      th:text="${p.stock} + ' left'">Low</span>
                <span th:if="${p.stock == 0}" class="stock-badge out-stock">Out of stock</span>
            </div>
            <a th:href="@{/products/{id}(id=${p.id})}" class="view-btn">View details</a>
        </div>
    </div>
</main>

<footer>&copy; 2026 VBForge Store — All rights reserved.</footer>
</body>
</html>
