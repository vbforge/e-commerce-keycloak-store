<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – VBForge Store</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#1a1a1e;--surface:#22222a;--surface2:#2a2a35;--border:#35354a;
            --accent:#4a90e2;--accent-h:#357abd;--accent2:#f5c518;
            --text:#e8e8f0;--muted:#8888a8;--danger:#e05252;--success:#52c78a;--radius:8px;
        }
        body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            background-image:radial-gradient(ellipse at 70% 40%,rgba(74,144,226,.07) 0%,transparent 55%);}
        .wrap{width:100%;max-width:420px;padding:1rem;}
        .logo{text-align:center;margin-bottom:1.8rem;}
        .logo-mark{font-size:2.2rem;margin-bottom:.4rem;}
        .logo h1{font-size:1.4rem;font-weight:800;letter-spacing:-.02em;}
        .logo h1 span{color:var(--accent2);}
        .logo p{color:var(--muted);font-size:.82rem;margin-top:.3rem;}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;}
        .card-title{font-size:1rem;font-weight:700;margin-bottom:1.4rem;}
        .form-group{margin-bottom:.9rem;}
        .form-group label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);
            text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem;}
        .form-group input{width:100%;padding:.6rem .9rem;background:var(--surface2);border:1px solid var(--border);
            border-radius:var(--radius);color:var(--text);font-size:.875rem;outline:none;transition:border-color .2s;}
        .form-group input:focus{border-color:var(--accent);}
        .field-error{color:#f09090;font-size:.75rem;margin-top:.25rem;}
        .btn-submit{width:100%;padding:.72rem;background:var(--accent);color:#fff;border:none;
            border-radius:var(--radius);font-size:.9rem;font-weight:700;cursor:pointer;transition:background .2s;margin-top:.4rem;}
        .btn-submit:hover{background:var(--accent-h);}
        .alert{padding:.65rem .9rem;border-radius:var(--radius);margin-bottom:1.1rem;font-size:.82rem;}
        .alert-error{background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.35);color:#f09090;}
        .hint{font-size:.75rem;color:var(--muted);margin-top:.2rem;}
        .footer-link{text-align:center;margin-top:1.2rem;font-size:.82rem;color:var(--muted);}
        .footer-link a{color:var(--accent);text-decoration:none;font-weight:600;}
        .footer-link a:hover{text-decoration:underline;}
    </style>
</head>
<body>
<div class="wrap">
    <div class="logo">
        <div class="logo-mark">🛒</div>
        <h1>VBForge <span>Store</span></h1>
        <p>Create your account</p>
    </div>
    <div class="card">
        <div class="card-title">New account</div>
        <div th:if="${registerError}" class="alert alert-error" th:text="${registerError}"></div>
        <form th:action="@{/register}" th:object="${registerDto}" method="post" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" th:field="*{username}" placeholder="Letters, digits, underscores" required>
                <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" th:field="*{email}" placeholder="you@example.com" required>
                <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" placeholder="At least 6 characters" required>
                <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                <div class="field-error" th:if="${passwordError}" th:text="${passwordError}"></div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm password</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Repeat password" required>
                <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>
            <button type="submit" class="btn-submit">Create Account</button>
        </form>
        <div class="footer-link" style="margin-top:1.2rem">Already have an account? <a href="/login">Sign in</a></div>
    </div>
</div>
</body>
</html>
