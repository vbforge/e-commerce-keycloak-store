<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart – VBForge Store</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#1a1a1e;--surface:#22222a;--surface2:#2a2a35;--border:#35354a;
            --accent:#4a90e2;--accent-h:#357abd;--accent2:#f5c518;
            --text:#e8e8f0;--muted:#8888a8;--danger:#e05252;--success:#52c78a;--radius:8px;
        }
        body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
        nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;
            height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
        .nav-brand{font-size:1.15rem;font-weight:800;text-decoration:none;color:var(--text);}
        .nav-brand span{color:var(--accent2);}
        .nav-links{display:flex;align-items:center;gap:1.4rem;}
        .nav-links a{color:var(--muted);text-decoration:none;font-size:.875rem;transition:color .2s;}
        .nav-links a:hover,.nav-links a.active{color:var(--text);}
        .btn{display:inline-block;padding:.38rem .9rem;border-radius:var(--radius);border:none;
            cursor:pointer;font-size:.82rem;font-weight:600;text-decoration:none;transition:all .2s;}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
        .btn-outline:hover{background:var(--surface2);}
        main{flex:1;padding:2.5rem 2rem;max-width:900px;width:100%;margin:0 auto;}
        .page-title{font-size:1.5rem;font-weight:800;margin-bottom:1.8rem;}
        .page-title span{color:var(--accent2);}
        /* CART LAYOUT */
        .cart-layout{display:grid;grid-template-columns:1fr 300px;gap:1.5rem;align-items:start;}
        @media(max-width:700px){.cart-layout{grid-template-columns:1fr;}}
        /* ITEMS */
        .cart-items{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
        .cart-item{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:1rem;
            padding:1rem 1.25rem;border-bottom:1px solid var(--border);}
        .cart-item:last-child{border-bottom:none;}
        .item-info{}
        .item-name{font-weight:600;font-size:.95rem;margin-bottom:.2rem;}
        .item-unit{font-size:.78rem;color:var(--muted);}
        .item-qty-form{display:flex;align-items:center;gap:.5rem;}
        .qty-input{width:60px;padding:.35rem .5rem;background:var(--surface2);border:1px solid var(--border);
            border-radius:var(--radius);color:var(--text);font-size:.85rem;text-align:center;outline:none;}
        .qty-input:focus{border-color:var(--accent);}
        .btn-update{padding:.3rem .65rem;background:var(--surface2);border:1px solid var(--border);
            border-radius:var(--radius);color:var(--muted);font-size:.75rem;cursor:pointer;transition:all .2s;}
        .btn-update:hover{border-color:var(--accent);color:var(--accent);}
        .item-subtotal{font-weight:700;font-size:.95rem;color:var(--accent);min-width:70px;text-align:right;}
        .btn-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;
            padding:.25rem;transition:color .2s;margin-left:.4rem;}
        .btn-remove:hover{color:var(--danger);}
        /* SUMMARY */
        .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;}
        .summary-title{font-size:.9rem;font-weight:700;margin-bottom:1.2rem;}
        .summary-row{display:flex;justify-content:space-between;font-size:.875rem;margin-bottom:.7rem;}
        .summary-row.total{font-size:1.05rem;font-weight:800;color:var(--accent);
            border-top:1px solid var(--border);padding-top:.8rem;margin-top:.4rem;}
        .summary-row .label{color:var(--muted);}
        .btn-checkout{display:block;width:100%;padding:.75rem;background:var(--accent);color:#fff;border:none;
            border-radius:var(--radius);font-size:.9rem;font-weight:700;text-align:center;
            text-decoration:none;cursor:pointer;transition:background .2s;margin-top:1.2rem;}
        .btn-checkout:hover{background:var(--accent-h);}
        .btn-shop{display:block;width:100%;padding:.6rem;background:transparent;border:1px solid var(--border);
            color:var(--text);border-radius:var(--radius);font-size:.82rem;text-align:center;
            text-decoration:none;margin-top:.6rem;transition:background .2s;}
        .btn-shop:hover{background:var(--surface2);}
        /* EMPTY */
        .empty-cart{text-align:center;padding:4rem 1rem;}
        .empty-icon{font-size:3rem;margin-bottom:1rem;}
        .empty-cart p{color:var(--muted);margin-bottom:1.5rem;}
        .btn-browse{display:inline-block;padding:.6rem 1.4rem;background:var(--accent);color:#fff;
            border-radius:var(--radius);text-decoration:none;font-weight:600;font-size:.875rem;}
        .btn-browse:hover{background:var(--accent-h);}
        .alert-success{background:rgba(82,199,138,.1);border:1px solid rgba(82,199,138,.35);color:#80dca8;
            padding:.65rem .9rem;border-radius:var(--radius);margin-bottom:1.2rem;font-size:.82rem;}
        footer{background:var(--surface);border-top:1px solid var(--border);
            padding:1.2rem 2rem;text-align:center;font-size:.78rem;color:var(--muted);}
    </style>
</head>
<body>

<nav>
    <a class="nav-brand" href="/">VBForge <span>Store</span></a>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/products">Products</a>
        <a href="/cart" class="active">Cart</a>
        <a href="/orders">Orders</a>
        <span sec:authentication="name" style="color:var(--muted);font-size:.82rem;"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn btn-outline">Sign out</button>
        </form>
    </div>
</nav>

<main>
    <div class="page-title">Your <span>Cart</span></div>

    <div th:if="${cartSuccess}" class="alert-success" th:text="${cartSuccess}"></div>

    <!-- Empty state -->
    <div th:if="${cart.isEmpty()}" class="empty-cart">
        <div class="empty-icon">🛒</div>
        <p>Your cart is empty.</p>
        <a href="/products" class="btn-browse">Browse products</a>
    </div>

    <!-- Cart with items -->
    <div th:unless="${cart.isEmpty()}" class="cart-layout">

        <div class="cart-items">
            <div class="cart-item" th:each="item : ${cart.items}">
                <div class="item-info">
                    <div class="item-name" th:text="${item.productName}">Product</div>
                    <div class="item-unit" th:text="'$' + ${#numbers.formatDecimal(item.unitPrice,1,2)} + ' each'">$0.00 each</div>
                </div>

                <form th:action="@{/cart/update}" method="post" class="item-qty-form">
                    <input type="hidden" name="cartItemId" th:value="${item.cartItemId}">
                    <input type="number" name="quantity" th:value="${item.quantity}" min="1" class="qty-input">
                    <button type="submit" class="btn-update">Update</button>
                </form>

                <div style="display:flex;align-items:center;">
                    <span class="item-subtotal" th:text="'$' + ${#numbers.formatDecimal(item.subtotal,1,2)}">$0.00</span>
                    <form th:action="@{/cart/remove}" method="post" style="display:inline">
                        <input type="hidden" name="cartItemId" th:value="${item.cartItemId}">
                        <button type="submit" class="btn-remove" title="Remove">✕</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Summary -->
        <div class="summary-card">
            <div class="summary-title">Order Summary</div>
            <div class="summary-row">
                <span class="label">Items</span>
                <span th:text="${cart.totalItems}">0</span>
            </div>
            <div class="summary-row">
                <span class="label">Subtotal</span>
                <span th:text="'$' + ${#numbers.formatDecimal(cart.totalPrice,1,2)}">$0.00</span>
            </div>
            <div class="summary-row">
                <span class="label">Shipping</span>
                <span style="color:var(--success)">Free</span>
            </div>
            <div class="summary-row total">
                <span>Total</span>
                <span th:text="'$' + ${#numbers.formatDecimal(cart.totalPrice,1,2)}">$0.00</span>
            </div>
            <a href="/checkout" class="btn-checkout">Proceed to Checkout</a>
            <a href="/products" class="btn-shop">Continue shopping</a>
        </div>

    </div>
</main>

<footer>&copy; 2026 VBForge Store — All rights reserved.</footer>
</body>
</html>
